# ~/.tmux.conf

# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# ============================================
# KEY BINDINGS
# ============================================

# Change prefix to Ctrl+s (more ergonomic)
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Better pane splitting (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'Left' if-shell "$is_vim" 'send-keys Left'  'select-pane -L'
bind-key -n 'Down' if-shell "$is_vim" 'send-keys Down'  'select-pane -D'
bind-key -n 'Up' if-shell "$is_vim" 'send-keys Up'  'select-pane -U'
bind-key -n 'Right' if-shell "$is_vim" 'send-keys Right'  'select-pane -R'

bind-key -T copy-mode-vi 'Left' select-pane -L
bind-key -T copy-mode-vi 'Down' select-pane -D
bind-key -T copy-mode-vi 'Up' select-pane -U
bind-key -T copy-mode-vi 'Right' select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Synchronize panes
bind S setw synchronize-panes

# ============================================
# APPEARANCE
# ============================================

#Status line
set -g status-interval 1
set -g status-position top
set -g status-left-length 30
set -g status-right-length 90

# Status line content
status_sessions="#[bg=green,fg=black] #{server_sessions} #[bg=#3E4452,fg=green]"
status_session="#[fg=white] #S #[bg=black,fg=#3E4452]"
status_mem="#(free -hm | awk '/Mem/{print $3\"/\"$2}')"
status_temp="🌡 #(sensors -f | awk '/CPU/{print $2}')"
status_uptime="Up #(awk '{s=int($1); d=s/86400; s%=86400; h=s/3600; s%=3600; m=s/60; printf(\"%%dd %%dh %%dm\", d,h,m)}' /proc/uptime)"
status_comp="#[bg=black,fg=#3E4452]#[bg=#3E4452,fg=white] ${status_mem}  ${status_temp}  ${status_uptime} "
status_date="#[fg=#5C6370]#[bg=#5C6370,fg=#D3D7DE] %a %b %d "
status_time="#[fg=blue]#[bg=blue,fg=black] %I:%M %p "
batt_color="#([ $(cat /sys/class/power_supply/BAT0/capacity) -gt 29 ] && echo 'green' || echo 'red')"
batt_icon="#([ $(cat /sys/class/power_supply/AC/online) = 1 ] && echo '🗲' || echo '')"
status_batt="#[fg=${batt_color}]#[bg=${batt_color},fg=black] ${batt_icon} #(cat /sys/class/power_supply/BAT0/capacity)% "
set -g status-style 'bg=black fg=white bold'
set -g status-left "${status_sessions}${status_session}"
set -g status-right "${status_comp}${status_date}${status_time}${status_batt}"

# Window status
setw -g window-status-format '#[fg=white] #I:#W '
setw -g window-status-current-format '#[fg=green] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#3E4452'
set -g pane-active-border-style 'fg=green'

# Message styling
set -g message-style 'bg=green fg=black bold'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy --foreground"

# Mouse copy bindings
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy --foreground"

# ============================================
# MOUSE SCROLLING
# ============================================

# Send up and down keys in alternate screen
bind -n WheelUpPane {
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' {
    send -M
  } {
    if -F '#{alternate_on}' { send-keys -N 3 Up } { copy-mode -e }
  }
}
bind -n WheelDownPane {
  if -F '#{||:#{pane_in_mode},#{mouse_any_flag}}' {
    send -M
  } {
    if -F '#{alternate_on}' { send-keys -N 3 Down }
  }
}
